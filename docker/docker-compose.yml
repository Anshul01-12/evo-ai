version: "3.9"

services:
  # ── Data Stores ──
  mongodb:
    image: mongo:7
    container_name: evo_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-evo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-evo_password}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  qdrant:
    image: qdrant/qdrant:latest
    container_name: evo_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── AI Runtime ──
  ollama:
    image: ollama/ollama:latest
    container_name: evo_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Application Services ──
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: evo_ai_service
    ports:
      - "8000:8000"
    env_file:
      - ../ai-service/.env
    depends_on:
      - ollama
      - qdrant
      - redis
    volumes:
      - ../ai-service:/app
      - upload_data:/app/uploads

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: evo_server
    ports:
      - "5000:5000"
    env_file:
      - ../server/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started
    volumes:
      - ../server:/app
      - /app/node_modules
      - upload_data:/app/uploads

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: evo_client
    ports:
      - "3000:3000"
    env_file:
      - ../client/.env
    depends_on:
      - server

volumes:
  mongo_data:
  redis_data:
  qdrant_data:
  ollama_data:
  upload_data:
